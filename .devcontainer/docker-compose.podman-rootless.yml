# Podman-rootless-only: without `userns_mode: keep-id`, the bind-mounted workspace shows up
# root-owned inside the container and non-root `dev-container-user` can't write to it. Kept as a
# separate file (merged onto docker-compose.yml via devcontainer.json's dockerComposeFile array)
# because `keep-id` isn't portable to Docker. Docker users: remove this file from that array.
# Full story: docs/devcontainer.md.
services:
  dev:
    userns_mode: "keep-id"
